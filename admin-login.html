<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login Page | RGPV</title>
  <link rel="stylesheet" href="admin-login.css">
</head> 
<body>

  <!-- Header -->
  <header class="header">
    <img src="https://www.rgpv.ac.in/Images/logo.jpg" alt="RGPV Logo" class="logo">
    <h1>Rajiv Gandhi Proudyogiki Vishwavidyalaya</h1>
  </header>

  <!-- Main Section -->
  <div class="main-container">
    <div class="login-box">
      <h2>Admin Panel Login</h2>

      <form id="loginForm">

        <label>Admin Username</label>
        <input type="text" id="username" placeholder="Enter Admin ID" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password" required>
        <p class="note">Password is case-sensitive</p>

        <label>Enter Captcha</label>
        <div class="captcha-box">
          <span id="captchaValue"></span>
          <button type="button" class="refresh-btn" onclick="generateCaptcha()">⟳</button>
        </div>

        <input type="text" id="captchaInput" placeholder="Type captcha here" required>

        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <footer>
    © Rajiv Gandhi Proudyogiki Vishwavidyalaya, Bhopal (M.P.)
  </footer>

  <script src="admin-login.js"></script>

</body>
</html>
