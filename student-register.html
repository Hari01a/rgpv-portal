<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration | RGPV</title>

<link rel="stylesheet" href="student-register.css">
</head>

<body>

<header>
    <img src="https://www.rgpv.ac.in/Images/logo.jpg" alt="RGPV Logo">
    <h1>Rajiv Gandhi Proudyogiki Vishwavidyalaya</h1>
</header>

<div class="container">

    <h2>Student Registration</h2>

    <form id="registerForm">

        <label>Full Name</label>
        <input
            type="text"
            id="fullName"
            required>

        <label>Enrollment Number</label>
        <input
            type="text"
            id="enrollment"
            required>

        <label>Email Address</label>
        <input
            type="email"
            id="email"
            required>

        <label>Mobile Number</label>
        <input
            type="text"
            id="mobile"
            required>

        <label>Password</label>
        <input
            type="password"
            id="password"
            required>

        <label>Confirm Password</label>
        <input
            type="password"
            id="confirmPassword"
            required>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already Registered?
        <a href="student login.html">
            Login Here
        </a>
    </div>

</div>

<footer>
    © Rajiv Gandhi Proudyogiki Vishwavidyalaya, Bhopal
</footer>

<script src="student-register.js"></script>

</body>
</html>
