<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Payment Form | RGPV</title>
  <link rel="stylesheet" href="student.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>RGPV Exam Payment Portal</h1>

    <div class="header-btns">
      <button class="dash-btn" onclick="window.location.href='index.html'">Dashboard</button>
      <button class="status-btn" onclick="window.location.href='student-status.html'">Check Status</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>



  <!-- MAIN FORM CARD -->
  <div class="container">

    <h2>Student Payment Submission</h2>



    <!-- ACADEMIC DETAILS -->
    <div class="section-title">Academic Details</div>

    <form id="studentForm" autocomplete="off">

      <!-- COURSE -->
      <label>Course:</label>
      <select id="course" required>
        <option value="">Select Course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>B.Sc</option>
        <option>M.Tech</option>
        <option>MCA</option>
        <option>M.Sc</option>
        <option>Diploma</option>
        <option>Pharmacy</option>
      </select>

      <!-- BRANCH -->
      <label>Branch:</label>
      <select id="branch" required>
        <option value="">Select Branch</option>
        <option>Computer Science Engineering</option>
        <option>Information Technology</option>
        <option>Electronics & Communication</option>
        <option>Civil Engineering</option>
        <option>Mechanical Engineering</option>
        <option>Electrical Engineering</option>
        <option>AI & Data Science</option>
        <option>AI & Machine Learning</option>
        <option>CE / EC / ME (Diploma)</option>
        <option>Pharmacy</option>
        <option>BCA</option>
        <option>MCA</option>
      </select>

      <!-- SEMESTER -->
      <label>Semester:</label>
      <select id="semester" required>
        <option value="">Select Semester</option>
        <option>1st</option>
        <option>2nd</option>
        <option>3rd</option>
        <option>4th</option>
        <option>5th</option>
        <option>6th</option>
        <option>7th</option>
        <option>8th</option>
      </select>




      <!--PERSONAL DETAILS -->
      <div class="section-title">Personal Details</div>

      <!-- NAME -->
      <label>Name:</label>
      <input type="text" id="name" required>

      <!-- ENROLLMENT -->
      <label>Enrollment Number:</label>
      <input type="text" id="enrollment">

      <!-- EMAIL -->
      <label>Email:</label>
      <input type="email" id="email" required>

      <!-- MOBILE -->
      <label>Mobile Number:</label>
      <input type="number" id="mobile" maxlength="10" placeholder="Enter 10-digit mobile" required>




      <!--PAYMENT DETAILS -->
      <div class="section-title">Payment Details</div>

      <label>Transaction ID:</label>
      <input type="text" id="transactionId" required>

      <label>Amount (₹):</label>
      <input type="number" id="amount" min="0" required>

      <label>Remarks (Optional):</label>
      <input type="text" id="remarks">




      <!--UPLOAD SLIP -->
      <div class="section-title">Upload Transaction Slip</div>

      <label>Upload Transaction Slip:</label>
      <input type="file" id="slip" accept="image/*, .pdf">

      <div id="previewBox">
        <p>No Slip Uploaded</p>
      </div>




      <!-- SUBMIT -->
      <button type="submit">Submit</button>

    </form>

  </div>



  <!-- FOOTER -->
  <footer>
    © Rajiv Gandhi Proudyogiki Vishwavidyalaya, Bhopal (M.P.)
  </footer>

  <script src="student.js"></script>
</body>
</html>
